# Application name
spring.application.name=crud-items

# PostgreSQL DataSource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/main
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
# validate: Validates schema against entity mappings (does not modify DB)
spring.jpa.hibernate.ddl-auto=validate
# show-sql: Prints SQL statements to console for debugging
spring.jpa.show-sql=true
# format_sql: Pretty-prints SQL in console output
spring.jpa.properties.hibernate.format_sql=true
# dialect: Tells Hibernate to generate PostgreSQL-specific SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate batch processing for better performance
# batch_size: Number of statements grouped before sending to DB
spring.jpa.properties.hibernate.jdbc.batch_size=20
# order_inserts: Groups INSERT statements by table to maximize batch efficiency
spring.jpa.properties.hibernate.order_inserts=true
# order_updates: Groups UPDATE statements by table to maximize batch efficiency
spring.jpa.properties.hibernate.order_updates=true